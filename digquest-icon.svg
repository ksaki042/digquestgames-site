<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1520"/>
      <stop offset="100%" style="stop-color:#0c0b0e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer border ring -->
  <rect x="8" y="8" width="496" height="496" rx="56" ry="56" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.25"/>
  
  <!-- Main background -->
  <rect x="20" y="20" width="472" height="472" rx="48" ry="48" fill="url(#bg)" stroke="#c9a84c" stroke-width="4"/>
  
  <!-- Inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="48" ry="48" fill="rgba(201,168,76,0.03)"/>
  
  <!-- D-Pad watermark (top-left) -->
  <g opacity="0.1" transform="translate(60, 60)">
    <!-- Horizontal bar -->
    <rect x="0" y="28" width="80" height="24" rx="2" fill="#c9a84c"/>
    <!-- Vertical bar -->
    <rect x="28" y="0" width="24" height="80" rx="2" fill="#c9a84c"/>
  </g>
  
  <!-- D-Pad watermark (bottom-right) -->
  <g opacity="0.06" transform="translate(372, 372)">
    <rect x="0" y="28" width="80" height="24" rx="2" fill="#c9a84c"/>
    <rect x="28" y="0" width="24" height="80" rx="2" fill="#c9a84c"/>
  </g>
  
  <!-- DQ Text -->
  <text x="256" y="280" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="160" fill="#c9a84c" filter="url(#glow)">DQ</text>
  
  <!-- GAMES subtitle -->
  <text x="256" y="360" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#c9a84c" opacity="0.5" letter-spacing="12">GAMES</text>
  
  <!-- Scan line effect -->
  <g opacity="0.04">
    <line x1="20" y1="100" x2="492" y2="100" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="140" x2="492" y2="140" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="180" x2="492" y2="180" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="220" x2="492" y2="220" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="260" x2="492" y2="260" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="300" x2="492" y2="300" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="340" x2="492" y2="340" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="380" x2="492" y2="380" stroke="#c9a84c" stroke-width="1"/>
    <line x1="20" y1="420" x2="492" y2="420" stroke="#c9a84c" stroke-width="1"/>
  </g>
</svg>
