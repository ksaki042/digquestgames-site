<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8a020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d060;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0b0d0;stop-opacity:1" />
    </linearGradient>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 1 0 0  0 0.3 1 0 0  0 0.5 2 0 0  0 0 0 0.8 0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="42" cy="28" r="1.2"/><circle cx="98" cy="67" r="0.8"/><circle cx="155" cy="19" r="1.0"/>
    <circle cx="210" cy="88" r="0.7"/><circle cx="280" cy="42" r="1.3"/><circle cx="340" cy="110" r="0.9"/>
    <circle cx="390" cy="30" r="1.1"/><circle cx="450" cy="75" r="0.8"/><circle cx="520" cy="15" r="1.0"/>
    <circle cx="580" cy="55" r="0.6"/><circle cx="640" cy="25" r="1.2"/><circle cx="700" cy="90" r="0.9"/>
    <circle cx="760" cy="38" r="1.0"/><circle cx="820" cy="70" r="0.7"/><circle cx="880" cy="22" r="1.1"/>
    <circle cx="940" cy="95" r="0.8"/><circle cx="1000" cy="45" r="1.3"/><circle cx="1060" cy="18" r="0.9"/>
    <circle cx="1120" cy="80" r="1.0"/><circle cx="1170" cy="40" r="0.7"/>
    <circle cx="60" cy="160" r="0.8"/><circle cx="130" cy="200" r="1.1"/><circle cx="200" cy="145" r="0.7"/>
    <circle cx="310" cy="185" r="0.9"/><circle cx="420" cy="155" r="1.2"/><circle cx="530" cy="190" r="0.8"/>
    <circle cx="660" cy="140" r="1.0"/><circle cx="780" cy="175" r="0.7"/><circle cx="900" cy="150" r="1.1"/>
    <circle cx="1050" cy="180" r="0.9"/><circle cx="1150" cy="135" r="1.0"/>
    <circle cx="80" cy="520" r="0.9"/><circle cx="180" cy="570" r="1.1"/><circle cx="320" cy="540" r="0.7"/>
    <circle cx="480" cy="590" r="0.8"/><circle cx="600" cy="555" r="1.2"/><circle cx="750" cy="510" r="0.9"/>
    <circle cx="890" cy="580" r="1.0"/><circle cx="1020" cy="545" r="0.7"/><circle cx="1140" cy="520" r="1.1"/>
  </g>

  <!-- Horizontal ornament lines -->
  <line x1="100" y1="228" x2="490" y2="228" stroke="#4060a0" stroke-width="0.5" opacity="0.5"/>
  <line x1="710" y1="228" x2="1100" y2="228" stroke="#4060a0" stroke-width="0.5" opacity="0.5"/>

  <!-- Wing left -->
  <g filter="url(#glowBlue)" opacity="0.6">
    <polyline points="490,228 350,200 200,228 350,256 490,228" fill="none" stroke="#6080c0" stroke-width="1"/>
    <line x1="350" y1="200" x2="350" y2="256" stroke="#6080c0" stroke-width="0.5"/>
    <line x1="280" y1="212" x2="420" y2="212" stroke="#6080c0" stroke-width="0.5" opacity="0.5"/>
    <line x1="280" y1="244" x2="420" y2="244" stroke="#6080c0" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Wing right -->
  <g filter="url(#glowBlue)" opacity="0.6">
    <polyline points="710,228 850,200 1000,228 850,256 710,228" fill="none" stroke="#6080c0" stroke-width="1"/>
    <line x1="850" y1="200" x2="850" y2="256" stroke="#6080c0" stroke-width="0.5"/>
    <line x1="780" y1="212" x2="920" y2="212" stroke="#6080c0" stroke-width="0.5" opacity="0.5"/>
    <line x1="780" y1="244" x2="920" y2="244" stroke="#6080c0" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Central diamond ornament -->
  <g filter="url(#glowBlue)">
    <polygon points="600,168 650,228 600,288 550,228" fill="none" stroke="#8090d0" stroke-width="1.5"/>
    <polygon points="600,188 634,228 600,268 566,228" fill="none" stroke="#a0b0e0" stroke-width="1"/>
    <polygon points="600,208 620,228 600,248 580,228" fill="url(#silverGrad)" opacity="0.3"/>
    <circle cx="600" cy="228" r="5" fill="#c0d0ff" opacity="0.8"/>
    <circle cx="600" cy="228" r="2" fill="white"/>
    <!-- Diamond corner dots -->
    <circle cx="600" cy="168" r="3" fill="#a0b0e0"/>
    <circle cx="650" cy="228" r="3" fill="#a0b0e0"/>
    <circle cx="600" cy="288" r="3" fill="#a0b0e0"/>
    <circle cx="550" cy="228" r="3" fill="#a0b0e0"/>
  </g>

  <!-- Corner L-brackets -->
  <g stroke="#4060a0" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="60,80 60,50 90,50"/>
    <polyline points="1140,80 1140,50 1110,50"/>
    <polyline points="60,550 60,580 90,580"/>
    <polyline points="1140,550 1140,580 1110,580"/>
  </g>

  <!-- Title text: VALKYRIE PROFILE -->
  <text x="600" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold"
        letter-spacing="8" text-anchor="middle" fill="url(#goldGrad)" filter="url(#glowGold)">VALKYRIE PROFILE</text>

  <!-- Subtitle: LENNETH -->
  <text x="600" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-style="italic"
        letter-spacing="12" text-anchor="middle" fill="#c0c8e0" opacity="0.9">LENNETH</text>

  <!-- Thin divider -->
  <line x1="400" y1="460" x2="800" y2="460" stroke="#4060a0" stroke-width="0.5" opacity="0.6"/>

  <!-- Credit line -->
  <text x="600" y="490" font-family="'Courier New', monospace" font-size="18"
        letter-spacing="3" text-anchor="middle" fill="#6070a0" opacity="0.8">tri-Ace × Enix · 1999 / 2022</text>
</svg>
